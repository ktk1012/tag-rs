[devshell]
name = "tag-rs"

[[commands]]
name = "build"
command = "cargo build"
help = "Build the project"
category = "dev"

[[commands]]
name = "run"
command = "cargo run --"
help = "Run tag-rs"
category = "dev"

[[commands]]
name = "test"
command = "cargo test"
help = "Run tests"
category = "dev"

[[commands]]
name = "lint"
command = "cargo clippy -- -D warnings && cargo fmt --check"
help = "Run clippy + format check"
category = "dev"
